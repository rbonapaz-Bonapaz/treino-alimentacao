<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness OS - Performance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chat-container { height: calc(100vh - 280px); }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 400px; height: 100vh; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .ai-content ul { list-style-type: disc; margin-left: 1.5rem; }
        .update-flash { animation: flash 0.8s ease-out; }
        @keyframes flash { 0% { background-color: rgba(59, 130, 246, 0.4); } 100% { background-color: transparent; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans text-sm">

    <div class="dashboard-grid">
        <main class="p-6 overflow-y-auto scroll-hide">
            <header class="mb-6 flex justify-between items-end border-b border-slate-800 pb-4">
                <div>
                    <h1 class="text-3xl font-black text-blue-500 italic uppercase">FITNESS <span class="text-white font-normal">OS</span></h1>
                    <div class="flex gap-4 mt-1 text-slate-400 text-xs">
                        <span>38 anos</span>
                        <span>Peso: <b class="text-white">75.5</b>kg</span>
                        <span>Limiar: <b class="text-white">4:43</b> min/km</span>
                    </div>
                </div>
                <div id="macro-summary" class="flex gap-3 text-[10px] font-mono bg-slate-900 p-2 rounded border border-slate-800">
                    <span class="text-blue-400 font-bold">P: --g</span> 
                    <span class="text-green-400 font-bold">C: --g</span> 
                    <span class="text-yellow-400 font-bold">G: --g</span>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 text-[11px]">
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex items-center justify-center">
                    <canvas id="recoveryChart" height="200"></canvas>
                </div>
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <h3 class="font-bold text-slate-500 mb-2 uppercase italic tracking-widest text-[10px]">Status Coros</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between border-b border-slate-800 pb-1"><span>Sono</span><b class="text-blue-400 font-bold">7h 45m</b></div>
                        <div class="flex justify-between border-b border-slate-800 pb-1"><span>Stress</span><b class="text-yellow-500 font-bold">Baixo (24)</b></div>
                        <div class="flex justify-between border-b border-slate-800 pb-1"><span>VFC</span><b class="text-green-500 font-bold">62 ms</b></div>
                    </div>
                </div>
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <h3 class="font-bold text-slate-500 mb-2 uppercase italic tracking-widest text-[10px]">Log Recente</h3>
                    <div id="activity-log" class="space-y-1 text-[10px] italic text-slate-500">Pronto para 2026.</div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <section id="card-corrida" class="bg-slate-900 p-5 rounded-2xl border-t-2 border-green-500 shadow-2xl transition-all min-h-[150px]">
                    <h2 class="font-bold mb-3 text-green-400 uppercase tracking-widest italic tracking-wider">🏃 Plano Corrida</h2>
                    <div id="corrida-content" class="ai-content text-slate-300">Aguardando...</div>
                </section>
                <section id="card-musculacao" class="bg-slate-900 p-5 rounded-2xl border-t-2 border-red-500 shadow-2xl transition-all min-h-[150px]">
                    <h2 class="font-bold mb-3 text-red-400 uppercase tracking-widest italic tracking-wider">🏋️ Musculação</h2>
                    <div id="musculacao-content" class="ai-content text-slate-300">Aguardando...</div>
                </section>
                <section id="card-dieta" class="bg-slate-900 p-5 rounded-2xl border-t-2 border-yellow-500 shadow-2xl col-span-full transition-all min-h-[150px]">
                    <h2 class="font-bold mb-3 text-yellow-500 uppercase tracking-widest italic font-bold tracking-wider">🍎 Nutrição</h2>
                    <div id="dieta-content" class="ai-content grid grid-cols-1 md:grid-cols-3 gap-4 italic text-slate-600">Aguardando...</div>
                </section>
            </div>
        </main>

        <aside class="bg-slate-900 border-l border-slate-800 flex flex-col shadow-2xl">
            <div class="p-4 border-b border-slate-800 bg-slate-950/50">
                <h3 class="font-bold text-blue-500 text-xs tracking-widest uppercase italic mb-3">Coach Gemini</h3>
                <div class="grid grid-cols-2 gap-2 text-[10px]">
                    <button onclick="quickAction('MONTAR_PLANO')" class="bg-blue-600 hover:bg-blue-500 p-2 rounded uppercase font-bold transition text-white">📝 Criar Plano</button>
                    <button onclick="quickAction('TREINO_FEITO')" class="bg-slate-800 hover:bg-green-600 p-2 rounded uppercase font-bold transition text-slate-300">✅ Treino OK</button>
                </div>
            </div>
            <div class="chat-container p-4 overflow-y-auto space-y-4 text-[12px] scroll-hide flex flex-col" id="chat-box"></div>
            <div class="p-4 bg-slate-950 mt-auto border-t border-slate-800">
                <div class="relative">
                    <input type="text" id="user-input" placeholder="Fale com o Coach..." class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl focus:ring-1 focus:ring-blue-500 outline-none text-white text-xs pr-10">
                    <button onclick="falarComGemini()" class="absolute right-2 top-1.5 bg-blue-600 p-2 rounded-lg text-white font-bold text-sm">➜</button>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // CHAVE ATUALIZADA - UTILIZANDO A QUE VOCÊ CRIOU HOJE (...VrVc)
        const API_KEY = "AIzaSyBbk88bpLs25HiYPNKIyMJXFmAwhIzVrVc";
        let radarChart;

        function initChart() {
            const ctx = document.getElementById('recoveryChart').getContext('2d');
            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Sono', 'Stress', 'Carga', 'Dieta', 'VFC'],
                    datasets: [{ data: [85, 90, 70, 80, 75], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.2)', borderWidth: 2 }]
                },
                options: {
                    scales: { r: { grid: { color: '#334155' }, angleLines: { color: '#334155' }, ticks: { display: false }, min: 0, max: 100, pointLabels: { color: '#94a3b8' } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        const SYSTEM_PROMPT = `Você é o Coach Gemini. Usuário: 38 anos, Corredor (4:43), 75.5kg. Responda APENAS em JSON.`;

        async function falarComGemini(promptOverride = null) {
            const msg = promptOverride || document.getElementById('user-input').value;
            if (!msg) return;

            addMsg('user', msg);
            document.getElementById('user-input').value = "";

            try {
                // ENDPOINT CORRIGIDO PARA EVITAR ERRO 404
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: SYSTEM_PROMPT }, { text: msg }] }]
                    })
                });

                if (!response.ok) throw new Error(`Status: ${response.status}`);

                const data = await response.json();
                let text = data.candidates[0].content.parts[0].text;
                const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));

                addMsg('gemini', json.fala);
                if (json.updateCorrida) updateUI('corrida-content', json.updateCorrida, 'card-corrida');
                if (json.updateMusculacao) updateUI('musculacao-content', json.updateMusculacao, 'card-musculacao');
                if (json.updateDieta) updateUI('dieta-content', json.updateDieta, 'card-dieta');
                if (json.radarData) { radarChart.data.datasets[0].data = json.radarData; radarChart.update(); }

            } catch (e) {
                console.error(e);
                addMsg('gemini', "Erro: Verifique se sua chave está ativa no Google AI Studio.");
            }
        }

        function updateUI(id, html, cardId) {
            document.getElementById(id).innerHTML = html;
            document.getElementById(cardId).classList.add('update-flash');
            setTimeout(() => document.getElementById(cardId).classList.remove('update-flash'), 800);
        }

        function addMsg(sender, text) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'bg-blue-600/10 p-2 rounded-lg self-end text-right border border-blue-500/20 max-w-[90%]' : 'bg-slate-800 p-2 rounded-lg self-start border border-slate-700 max-w-[90%]';
            div.innerHTML = text;
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        function quickAction(acao) {
            const p = acao === 'MONTAR_PLANO' ? "Gere meu plano semanal: Musculação, Corrida e Dieta." : "Treino de hoje OK!";
            falarComGemini(p);
        }

        window.onload = () => { initChart(); falarComGemini("Carregue o dashboard."); };
    </script>
</body>
</html>
